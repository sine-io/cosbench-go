{{define "controller_timeline.html"}}{{template "layout" .}}{{end}}
{{define "page_content"}}
<section class="card">
  <h1>Job Timeline</h1>
  <p>Job: {{.Job.Name}}</p>
  <table>
    <thead><tr><th>Timestamp</th><th>Ops</th><th>Bytes</th><th>Errors</th></tr></thead>
    <tbody>
    {{range .Timeline.Job}}
    <tr>
      <td>{{.Timestamp.Format "2006-01-02 15:04:05"}}</td>
      <td>{{.OperationCount}}</td>
      <td>{{.ByteCount}}</td>
      <td>{{.ErrorCount}}</td>
    </tr>
    {{end}}
    </tbody>
  </table>
</section>
{{end}}
