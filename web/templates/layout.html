{{define "layout"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} | cosbench-go</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="shell-header">
    <div>
      <a class="brand" href="/">cosbench-go</a>
      <p class="subtitle">Web-first benchmark control plane</p>
    </div>
    <nav class="nav">
      <a class="{{if eq .RequestPath "/"}}active{{end}}" href="/">Dashboard</a>
      <a class="{{if eq .RequestPath "/controller/matrix"}}active{{end}}" href="/controller/matrix">Controller</a>
      <a class="{{if eq .RequestPath "/workloads/new"}}active{{end}}" href="/workloads/new">Upload</a>
      <a class="{{if eq .RequestPath "/endpoints"}}active{{end}}" href="/endpoints">Endpoints</a>
      <a class="{{if eq .RequestPath "/history"}}active{{end}}" href="/history">History</a>
    </nav>
  </header>
  <main class="shell-main">
    {{if .Error}}<div class="flash error">{{.Error}}</div>{{end}}
    {{if .Success}}<div class="flash success">Operation completed.</div>{{end}}
    {{template "page_content" .}}
  </main>
</body>
</html>
{{end}}
