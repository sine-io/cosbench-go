name: Remote Smoke Recovery

"on":
  workflow_dispatch:
    inputs:
      backend:
        description: Backend to run through the remote recovery smoke helper
        required: false
        default: "s3"

jobs:
  remote_smoke_recovery:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Setup Go
        uses: actions/setup-go@v6.2.0
        with:
          go-version-file: go.mod

      - name: Run remote recovery smoke
        run: SMOKE_REMOTE_LOCAL_BACKEND='${{ inputs.backend }}' SMOKE_REMOTE_LOCAL_SCENARIO=recovery GO=go make --no-print-directory smoke-remote-local

      - name: Upload remote smoke artifact
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: remote-smoke-recovery-output
          path: .artifacts/remote-smoke

      - name: Build remote smoke recovery summary artifact
        if: always()
        run: python3 ./scripts/build_remote_smoke_recovery_summary.py .artifacts/remote-smoke .artifacts/remote-smoke-recovery-summary

      - name: Upload remote smoke recovery summary artifact
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: remote-smoke-recovery-summary
          path: .artifacts/remote-smoke-recovery-summary

      - name: Write remote smoke summary
        if: always()
        shell: bash
        run: |
          if [ -f .artifacts/remote-smoke/summary.md ]; then
            cat .artifacts/remote-smoke/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "# Remote Smoke Recovery"
              echo
              echo "Remote smoke helper failed before emitting .artifacts/remote-smoke/summary.md."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
