name: Smoke S3

on:
  workflow_dispatch:
    inputs:
      backend:
        description: Backend to run through the live smoke helper
        required: false
        default: "s3"
      region:
        description: Optional region override
        required: false
        default: ""
      path_style:
        description: Optional path-style access override
        required: false
        default: ""
      bucket_prefix:
        description: Optional bucket prefix override
        required: false
        default: ""

jobs:
  smoke-s3:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      COSBENCH_SMOKE_ENDPOINT: ${{ secrets.COSBENCH_SMOKE_ENDPOINT }}
      COSBENCH_SMOKE_ACCESS_KEY: ${{ secrets.COSBENCH_SMOKE_ACCESS_KEY }}
      COSBENCH_SMOKE_SECRET_KEY: ${{ secrets.COSBENCH_SMOKE_SECRET_KEY }}
      COSBENCH_SMOKE_BACKEND: ${{ inputs.backend }}
      COSBENCH_SMOKE_REGION: ${{ inputs.region }}
      COSBENCH_SMOKE_PATH_STYLE: ${{ inputs.path_style }}
      COSBENCH_SMOKE_BUCKET_PREFIX: ${{ inputs.bucket_prefix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Setup Go
        uses: actions/setup-go@v6.2.0
        with:
          go-version-file: go.mod

      - name: Run live smoke
        run: GO=go make smoke-s3 | tee smoke-s3-output.txt

      - name: Summarize smoke output
        if: always()
        run: |
          mkdir -p .artifacts/smoke-s3-summary
          python3 ./scripts/summarize_smoke_s3_output.py \
            smoke-s3-output.txt \
            .artifacts/smoke-s3-summary/summary.json

      - name: Write smoke summary
        if: always()
        shell: bash
        run: |
          cat smoke-s3-output.txt >> "$GITHUB_STEP_SUMMARY"
          if [ -f .artifacts/smoke-s3-summary/summary.json ]; then
            echo >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat .artifacts/smoke-s3-summary/summary.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload smoke artifact
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: smoke-s3-output
          path: |
            smoke-s3-output.txt
            .artifacts/smoke-s3-summary/summary.json
