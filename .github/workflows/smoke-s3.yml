name: Smoke S3

on:
  workflow_dispatch:
    inputs:
      backend:
        description: Backend to use for the smoke run
        required: false
        default: s3
        type: choice
        options:
          - s3
          - sio
      region:
        description: Optional region override
        required: false
        default: ""
      path_style:
        description: Optional path-style override
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "true"
          - "false"
      bucket_prefix:
        description: Optional bucket prefix override
        required: false
        default: ""

jobs:
  smoke-s3:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      COSBENCH_SMOKE_ENDPOINT: ${{ secrets.COSBENCH_SMOKE_ENDPOINT }}
      COSBENCH_SMOKE_ACCESS_KEY: ${{ secrets.COSBENCH_SMOKE_ACCESS_KEY }}
      COSBENCH_SMOKE_SECRET_KEY: ${{ secrets.COSBENCH_SMOKE_SECRET_KEY }}
      COSBENCH_SMOKE_BACKEND: ${{ inputs.backend }}
      COSBENCH_SMOKE_REGION: ${{ inputs.region }}
      COSBENCH_SMOKE_PATH_STYLE: ${{ inputs.path_style }}
      COSBENCH_SMOKE_BUCKET_PREFIX: ${{ inputs.bucket_prefix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Setup Go
        uses: actions/setup-go@v6.2.0
        with:
          go-version-file: go.mod

      - name: Validate smoke secrets
        run: |
          missing=0
          for name in COSBENCH_SMOKE_ENDPOINT COSBENCH_SMOKE_ACCESS_KEY COSBENCH_SMOKE_SECRET_KEY; do
            if [ -z "${!name}" ]; then
              echo "missing required secret: $name" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Run opt-in smoke suite
        run: GO=go make smoke-s3 | tee smoke-s3-output.txt

      - name: Write smoke summary
        if: always()
        run: |
          {
            echo "## Smoke S3"
            echo
            echo "Requested backend: \`${COSBENCH_SMOKE_BACKEND:-s3}\`"
            echo
            echo "Requested region: \`${COSBENCH_SMOKE_REGION:-}\`"
            echo
            echo "Requested path style: \`${COSBENCH_SMOKE_PATH_STYLE:-}\`"
            echo
            echo "Requested bucket prefix: \`${COSBENCH_SMOKE_BUCKET_PREFIX:-}\`"
            echo
            GO=go make --no-print-directory smoke-ready | sed -e '1s/^# /### /' -e 's/^## /#### /'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload smoke artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: smoke-s3-output
          path: smoke-s3-output.txt
