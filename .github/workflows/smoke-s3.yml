name: Smoke S3

on:
  workflow_dispatch:
    inputs:
      backend:
        description: Backend to use for the smoke run
        required: false
        default: s3
        type: choice
        options:
          - s3
          - sio
      region:
        description: Optional region override
        required: false
        default: ""
      path_style:
        description: Optional path-style override
        required: false
        default: ""
      bucket_prefix:
        description: Optional bucket prefix override
        required: false
        default: ""

jobs:
  smoke-s3:
    runs-on: ubuntu-latest
    env:
      COSBENCH_SMOKE_ENDPOINT: ${{ secrets.COSBENCH_SMOKE_ENDPOINT }}
      COSBENCH_SMOKE_ACCESS_KEY: ${{ secrets.COSBENCH_SMOKE_ACCESS_KEY }}
      COSBENCH_SMOKE_SECRET_KEY: ${{ secrets.COSBENCH_SMOKE_SECRET_KEY }}
      COSBENCH_SMOKE_BACKEND: ${{ inputs.backend }}
      COSBENCH_SMOKE_REGION: ${{ inputs.region }}
      COSBENCH_SMOKE_PATH_STYLE: ${{ inputs.path_style }}
      COSBENCH_SMOKE_BUCKET_PREFIX: ${{ inputs.bucket_prefix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run opt-in smoke suite
        run: GO=go make smoke-s3

      - name: Write smoke summary
        run: |
          {
            echo "## Smoke S3"
            echo
            echo "Backend: \`${COSBENCH_SMOKE_BACKEND:-s3}\`"
            echo
            echo "Region: \`${COSBENCH_SMOKE_REGION:-}\`"
            echo
            echo "Path style: \`${COSBENCH_SMOKE_PATH_STYLE:-}\`"
            echo
            echo "Bucket prefix: \`${COSBENCH_SMOKE_BUCKET_PREFIX:-}\`"
          } >> "$GITHUB_STEP_SUMMARY"
