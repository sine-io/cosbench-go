name: Compare Local

on:
  workflow_dispatch:
    inputs:
      fixture:
        description: Optional compare-local fixture name or comma-separated subset to run
        required: false
        default: ""

jobs:
  compare-local:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run local comparison set
        run: COMPARE_LOCAL_FILTER='${{ inputs.fixture }}' GO=go make compare-local

      - name: Write compare-local summary
        run: cat .artifacts/compare-local/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload compare-local artifact
        uses: actions/upload-artifact@v4
        with:
          name: compare-local-output
          path: .artifacts/compare-local
