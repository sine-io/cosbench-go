name: Smoke Ready Validate

"on":
  workflow_dispatch:
  schedule:
    - cron: "7 4 * * *"

jobs:
  smoke-ready-validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Capture smoke-ready payload
        run: |
          mkdir -p .artifacts/smoke-ready-validate
          make --no-print-directory smoke-ready-json > .artifacts/smoke-ready-validate/smoke-ready.json

      - name: Validate smoke-ready schema
        run: |
          make --no-print-directory smoke-ready-validate-json > .artifacts/smoke-ready-validate/validation.json

      - name: Build smoke-ready validation summary artifact
        if: always()
        run: python3 ./scripts/build_smoke_ready_validate_summary.py .artifacts/smoke-ready-validate .artifacts/smoke-ready-validate-summary

      - name: Write validation summary
        if: always()
        shell: bash
        run: |
          if [ -f .artifacts/smoke-ready-validate-summary/summary.md ]; then
            cat .artifacts/smoke-ready-validate-summary/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "# Smoke Ready Validate"
              echo
              echo "Smoke Ready validator failed before emitting .artifacts/smoke-ready-validate-summary/summary.md."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload validation artifact
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: smoke-ready-validate-output
          path: .artifacts/smoke-ready-validate

      - name: Upload validation summary artifact
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: smoke-ready-validate-summary
          path: .artifacts/smoke-ready-validate-summary
          if-no-files-found: ignore
